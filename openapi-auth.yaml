      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - statusMessage
                  - message
                  - data
                  - timestamp
                properties:
                  status:
                    type: integer
                    format: int32
                  statusMessage:
                    type: string
                  message:
                    type: string
                  data:
                    nullable: true
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
