components:
  schemas:
    AccountStatus:
      type: string
      enum:
        - ACTIVE
        - BLOCKED
        - DELETED
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 3
          maxLength: 100
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 50
    AuthResponseModel:
      type: object
      required:
        - mfaRequired
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        mfaTempToken:
          type: string
        mfaRequired:
          type: boolean
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          minLength: 6
          maxLength: 50
          description: Текущий пароль
        newPassword:
          type: string
          minLength: 6
          maxLength: 50
          description: Новый пароль
      description: Запрос на смену пароля
    ErrorResponse:
      type: object
      required:
        - status
        - statusMessage
        - message
        - path
        - method
        - timestamp
      properties:
        status:
          type: integer
          format: int32
        statusMessage:
          type: string
        message:
          type: string
        path:
          type: string
        method:
          type: string
        timestamp:
          type: string
          format: date-time
        fieldErrors:
          type: object
          additionalProperties:
            type: string
        rejectedValues:
          type: object
          additionalProperties: {}
        details:
          type: object
          additionalProperties: {}
    MfaType:
      type: string
      enum:
        - OTP
    OAuth2Provider:
      type: string
      enum:
        - GOOGLE
        - GITHUB
    OtpConnectDto:
      type: object
      required:
        - secretUri
      properties:
        secretUri:
          type: string
    OtpDisableRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
    OtpVerifyRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
        mfaTempToken:
          type: string
          minLength: 1
          maxLength: 500
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          minLength: 3
          maxLength: 100
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 50
    ResetPasswordRequest:
      type: object
      required:
        - resetToken
        - newPassword
      properties:
        resetToken:
          type: string
          description: Токен сброса пароля
        newPassword:
          type: string
          minLength: 6
          maxLength: 50
          description: Новый пароль
      description: Запрос на сброс пароля
    RoleUpdateRequest:
      type: object
      required:
        - userRoles
      properties:
        userRoles:
          type: array
          items:
            $ref: '#/components/schemas/Roles'
          minItems: 1
          description: Новый набор ролей
      description: Запрос на обновление ролей пользователя
    Roles:
      type: string
      enum:
        - USER
        - ADMIN
    SecurityStatusDto:
      type: object
      required:
        - userId
        - email
        - emailVerified
        - passwordSet
        - mfaEnabled
        - mfaTypes
        - roles
        - linkedProviders
        - accountStatus
      properties:
        userId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: ID пользователя
        email:
          type: string
          description: Email пользователя
        emailVerified:
          type: boolean
          description: Подтвержден ли email
        passwordSet:
          type: boolean
          description: Установлен ли пароль
        mfaEnabled:
          type: boolean
          description: Включена ли MFA
        mfaTypes:
          type: array
          items:
            $ref: '#/components/schemas/MfaType'
          description: Типы MFA
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Roles'
          description: Роли пользователя
        linkedProviders:
          type: array
          items:
            $ref: '#/components/schemas/OAuth2Provider'
          description: Связанные OAuth2 провайдеры
        accountStatus:
          allOf:
            - $ref: '#/components/schemas/AccountStatus'
          description: Статус аккаунта
      description: Статус безопасности пользователя
    SendResetPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          minLength: 3
          maxLength: 100
          format: email
          description: Email пользователя
      description: Запрос на отправку письма для сброса пароля
    SessionModel:
      type: object
      required:
        - tokenId
        - sessionId
        - issuedAt
        - loggedInAt
        - expiresAt
        - current
      properties:
        tokenId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: ID токена
        sessionId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: ID сессии
        issuedAt:
          type: string
          format: date-time
          description: Время выдачи токена (обновляется при каждом рефреше)
        loggedInAt:
          type: string
          format: date-time
          description: Время первого входа сессии (не меняется при рефрешах) — использовать как «начало сессии»
        expiresAt:
          type: string
          format: date-time
          description: Время истечения срока действия
        current:
          type: boolean
          description: Является ли сессия текущей
        browser:
          type: string
          description: Браузер
        os:
          type: string
          description: Операционная система
        device:
          type: string
          description: Устройство
        ipAddress:
          type: string
          description: IP адрес
      description: Информация о сессии
    SetPasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 6
          maxLength: 50
          description: Новый пароль
      description: Запрос на установку пароля
    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
        bio:
          type: string
          maxLength: 500
    User:
      type: object
      required:
        - id
        - username
        - email
        - roles
        - emailVerified
        - mfaEnabled
        - accountStatus
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        username:
          type: string
        email:
          type: string
        bio:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Roles'
        emailVerified:
          type: boolean
        mfaEnabled:
          type: boolean
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
      description: Пользователь
    UserProfile:
      type: object
      required:
        - id
        - username
      properties:
        id:
          $ref: '#/components/schemas/uuid'
        username:
          type: string
        bio:
          type: string
      description: Публичный профиль пользователя (без приватных данных)
    VerifyEmailRequest:
      type: object
      required:
        - verificationToken
      properties:
        verificationToken:
          type: string
          description: Токен подтверждения email
      description: Запрос на подтверждение email
    uuid:
      type: string
      format: uuid
servers:
  - url: https://quingo.arhr.tech/api/auth
    description: Production server
    variables: {}
